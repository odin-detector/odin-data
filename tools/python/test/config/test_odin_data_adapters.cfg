[server]
debug_mode = 1
http_port  = 8080
http_addr  = 127.0.0.1
adapters = fr, fp, system_info

[tornado]
logging = debug

[adapter.fr]
module = odin_data.frame_receiver_adapter.FrameReceiverAdapter
endpoints = 127.0.0.1:5000, 127.0.0.1:5001
update_interval = 1.0

[adapter.fp]
module = odin_data.frame_processor_adapter.FrameProcessorAdapter
endpoints = 127.0.0.1:5004, 127.0.0.1:5005
update_interval = 1.0

[adapter.system_info]
module = odin.adapters.system_info.SystemInfoAdapter