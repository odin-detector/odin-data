name: CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:

jobs:

  code_check:
    uses: ./.github/workflows/_code_check.yml

  python_test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    uses: ./.github/workflows/_python.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
