on:
  workflow_call:
    inputs:
      os:
        type: string
        description: The OS type for this job
        required: true
      python-version:
        type: string
        description: The version of python to install
        required: true

jobs:
  python_test:
    runs-on: ${{ inputs.os }}

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install odin-data python pacakge
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,meta_writer]
          python -c "from odin_data import __version__; print(__version__)"

      - name: Run tests
        run:
          pytest -vs --cov=odin_data --cov-report=term-missing
