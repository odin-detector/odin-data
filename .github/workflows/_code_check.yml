name: Cpp code check CI

on:
  workflow_call:
    inputs:
      os:
        type: string
        description: The OS type for this job
        required: true

jobs:
  code_format_check:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt -y update
          sudo apt install clang-format-20 clang-tidy-20
      - name: Check code formatting
        run: |
          scripts/format_source.sh cpp --dry-run --Werror
